# Ignore existing findings (baseline)
# Composite action findings are suppressed inline with # zizmor: ignore
rules:
  dangerous-triggers:
    ignore:
      - auto_request_review.yml
      - auto_review_pr.yml
      - labeler.yml
      - pr-playground.yml
  dependabot-cooldown:
    ignore:
      - dependabot.yml
  misfeature:
    ignore:
      - mingw.yml
      - windows.yml
  unpinned-images:
    ignore:
      - compilers.yml
  secrets-outside-env:
    # All committers with write access are trusted; no need for environment-scoped secrets.
    disable: true
  unpinned-uses:
    ignore:
      - wsl.yml
