name: tarball-windows (reusable)

on:
  workflow_call:
    inputs:
      archname:
        description: 'archname (e.g. snapshot-master)'
        required: true
        type: string
      patch-url:
        description: 'Patch URL forwarded from workflow_dispatch'
        required: false
        type: string
        default: ''
      mode:
        description: '"modern" (vssetup + 2022/2025-vs2026) or "legacy" (vs2022 + vcvars 14.2 + test-all/test-spec split)'
        required: false
        type: string
        default: 'modern'

jobs:
  windows:
    strategy:
      matrix:
        include: ${{ fromJSON(inputs.mode == 'legacy'
          && '[{"os":"2022","vs":2022,"vcvars":"10.0.22621.0 -vcvars_ver=14.2","test_task":"check"}]'
          || '[{"os":"2022","test_task":"check"},{"os":"2025-vs2026","test_task":"check"}]') }}
      fail-fast: false
    runs-on: windows-${{ matrix.os }}
    defaults:
      run:
        shell: cmd
        working-directory: build
    name: Windows ${{ matrix.os }} (${{ matrix.test_task }})
    env:
      GITPULLOPTIONS: --no-tags origin ${{github.ref}}
      PATCH: C:\msys64\usr\bin\patch.exe
      OS_VER: windows-${{ matrix.os }}
      # see https://github.com/ruby/ruby/commit/9ff4399decef0036897d3cfb9ac2c710dea913ca
      OPENSSL_MODULES: C:\vcpkg\installed\x64-windows\bin
    steps:
      - run: md build
        working-directory:

      - uses: ruby/setup-ruby@c4e5b1316158f92e3d49443a9d58b31d25ac0f8f # v1.306.0
        with:
          ruby-version: '3.1'
          bundler: none
          windows-toolchain: none

      - uses: msys2/setup-msys2@e9898307ac31d1a803454791be09ab9973336e1c # v2.31.1
        id: setup-msys2
        with:
          update: true
          install: >-
            patch
      - name: patch path
        shell: msys2 {0}
        run: echo PATCH=$(cygpath -wa $(command -v patch)) >> $GITHUB_ENV
        if: ${{ steps.setup-msys2.outcome == 'success' }}
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: C:\vcpkg\installed
          key: ${{ runner.os }}-vcpkg-installed-${{ env.OS_VER }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-installed-${{ env.OS_VER }}-
            ${{ runner.os }}-vcpkg-installed-
      - name: Install libraries with vcpkg
        run: |
          vcpkg --triplet x64-windows install libffi libyaml openssl readline zlib

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: Packages
          path: pkg
      - name: Extract
        run: 7z x pkg/*.zip
        working-directory:
      - name: Apply patch
        run: |
          set -x
          curl -sSL "${RUBY_PATCH_URL}" -o ruby.patch
          cd "$ARCHNAME"
          git apply ../ruby.patch
        shell: bash
        env:
          RUBY_PATCH_URL: ${{ inputs.patch-url }}
          ARCHNAME: ${{ inputs.archname }}
        if: inputs.patch-url != ''
        working-directory:

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: snapshot-*/.downloaded-cache
          key: downloaded-cache

      - name: setup env (modern)
        # %TEMP% is inconsistent with %TMP% and test-all expects they are consistent.
        # https://github.com/actions/virtual-environments/issues/712#issuecomment-613004302
        env:
          ARCHNAME: ${{ inputs.archname }}
        run: |
          set > old.env
          call ..\%ARCHNAME%\win32\vssetup.cmd
          set TMP=%USERPROFILE%\AppData\Local\Temp
          set TEMP=%USERPROFILE%\AppData\Local\Temp
          set /a TEST_JOBS=(15 * %NUMBER_OF_PROCESSORS% / 10) > nul
          set > new.env
        if: inputs.mode == 'modern'
      - name: setup env (legacy)
        run: |
          if not "%VCVARS%" == "" goto :vcset
            set VCVARS="C:\Program Files (x86)\Microsoft Visual Studio\${{ matrix.vs }}\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
            if not exist %VCVARS% set VCVARS="C:\Program Files\Microsoft Visual Studio\${{ matrix.vs }}\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          :vcset
          set > old.env
          call %VCVARS% ${{ matrix.vcvars }}
          set TMP=%USERPROFILE%\AppData\Local\Temp
          set TEMP=%USERPROFILE%\AppData\Local\Temp
          set /a TEST_JOBS=(15 * %NUMBER_OF_PROCESSORS% / 10) > nul
          set > new.env
        if: inputs.mode == 'legacy'

      - name: update env
        shell: pwsh
        run: |
          $old = (Get-Content old.env); $new = (Get-Content new.env)
          del *.env
          Compare-Object $old $new |
            Where-Object { $_.SideIndicator -eq '=>' } |
            Select-Object -ExpandProperty InputObject |
            Add-Content -Path $env:GITHUB_ENV
      - name: link libraries
        run: |
          for %%I in (C:\vcpkg\installed\x64-windows\bin\*.dll) do (
            if not %%~nI == readline mklink %%~nxI %%I
          )
      - name: Configure
        env:
          ARCHNAME: ${{ inputs.archname }}
        run: >-
          ../%ARCHNAME%/win32/configure.bat --disable-install-doc
          --with-opt-dir=C:/vcpkg/installed/x64-windows
      - run: nmake incs
      - run: nmake extract-extlibs
      - run: nmake
        env:
          YACC: win_bison

      - name: ruby -v
        run: |
          .\ruby -v

      - run: nmake test
        timeout-minutes: 5

      - run: nmake ${{ matrix.test_task }}
        env:
          RUBY_TESTOPTS: -j${{env.TEST_JOBS}}
        timeout-minutes: 70
        continue-on-error: ${{ matrix.continue-on-error || false }}

      - uses: ruby/action-slack@54175162371f1f7c8eb94d7c8644ee2479fcd375 # v3.2.2
        with:
          payload: |
            {
              "attachments": [{
                "text": "${{ job.status }}: ${{ env.OS_VER }} / ${{ matrix.test_task }} <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|${{ github.workflow }}>",
                "color": "danger"
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SNAPSHOT_SLACK_WEBHOOK_URL }}
        if: failure() && github.event_name == 'schedule'
