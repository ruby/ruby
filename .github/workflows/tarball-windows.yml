name: tarball-windows (reusable)

on:
  workflow_call:
    inputs:
      archname:
        description: 'archname (e.g. snapshot-master)'
        required: true
        type: string
      notify-release-channel:
        description: 'Also send failure notifications to SNAPSHOT_SLACK_WEBHOOK_URL (schedule/release builds).'
        required: false
        type: boolean
        default: false
    secrets:
      SIMPLER_ALERTS_URL:
        required: false
      SNAPSHOT_SLACK_WEBHOOK_URL:
        required: false

# GITHUB_TOKEN permissions are inherited from the caller job. Declaring
# permissions here would be an elevation request and fail at startup when
# the caller's token is capped to read-only (fork pull requests).

jobs:
  windows:
    strategy:
      matrix:
        include:
          - os: '2022'
            vs: 2022
            vcvars: '10.0.22621.0 -vcvars_ver=14.2'
            test_task: check
      fail-fast: false
    runs-on: windows-${{ matrix.os }}
    defaults:
      run:
        shell: cmd
        working-directory: build
    name: Windows ${{ matrix.os }} (${{ matrix.test_task }})
    env:
      GITPULLOPTIONS: --no-tags origin ${{github.ref}}
      PATCH: C:\msys64\usr\bin\patch.exe
      OS_VER: windows-${{ matrix.os }}
      VCPKG_DEFAULT_TRIPLET: x64-windows
      FEED_URL: https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json
    steps:
      - run: md build
        working-directory:

      - uses: ruby/setup-ruby@6aaa311d81eba98ae12eaffbcb63296ace0efcde # v1.307.0
        with:
          ruby-version: '3.2'
          bundler: none
          windows-toolchain: none

      - uses: msys2/setup-msys2@e9898307ac31d1a803454791be09ab9973336e1c # v2.31.1
        id: setup-msys2
        with:
          update: true
          install: >-
            patch
      - name: patch path
        shell: msys2 {0}
        run: echo PATCH=$(cygpath -wa $(command -v patch)) >> $GITHUB_ENV
        if: ${{ steps.setup-msys2.outcome == 'success' }}
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: Packages
          path: pkg
      - name: Extract
        run: 7z x pkg/*.zip
        working-directory:

      - name: Set up vcpkg binary cache
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FEED_OWNER: ${{ github.repository_owner }}
          # The github context of a reusable workflow belongs to the caller;
          # the GITHUB_TOKEN of pull_request events (forks, dependabot) is
          # read-only. Packages are uploaded on push, merge_group, and
          # workflow_dispatch.
          FEED_MODE: ${{ github.event_name != 'pull_request' && 'readwrite' || 'read' }}
        run: |
          $nuget = (vcpkg fetch nuget) | Select-Object -Last 1
          & $nuget sources add -Source $Env:FEED_URL -StorePasswordInClearText `
            -Name GitHubPackages -UserName $Env:FEED_OWNER -Password $Env:GH_TOKEN
          & $nuget setapikey $Env:GH_TOKEN -Source $Env:FEED_URL
          "VCPKG_BINARY_SOURCES=clear;nuget,$Env:FEED_URL,$Env:FEED_MODE" >> $Env:GITHUB_ENV

      - name: Install libraries with vcpkg
        run: |
          git -C "%VCPKG_INSTALLATION_ROOT%" pull --quiet
          vcpkg install
        working-directory: ${{ inputs.archname }}

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: snapshot-*/.downloaded-cache
          key: downloaded-cache

      - name: setup env
        # OPENSSL_MODULES: see https://github.com/ruby/ruby/commit/9ff4399decef0036897d3cfb9ac2c710dea913ca
        env:
          ARCHNAME: ${{ inputs.archname }}
        run: |
          if not "%VCVARS%" == "" goto :vcset
            set VCVARS="C:\Program Files (x86)\Microsoft Visual Studio\${{ matrix.vs }}\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
            if not exist %VCVARS% set VCVARS="C:\Program Files\Microsoft Visual Studio\${{ matrix.vs }}\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          :vcset
          set > old.env
          call %VCVARS% ${{ matrix.vcvars }}
          set TMP=%USERPROFILE%\AppData\Local\Temp
          set TEMP=%USERPROFILE%\AppData\Local\Temp
          set /a TEST_JOBS=(15 * %NUMBER_OF_PROCESSORS% / 10) > nul
          set RUBY_OPT_DIR=%GITHUB_WORKSPACE:\=/%/%ARCHNAME%/vcpkg_installed/%VCPKG_DEFAULT_TRIPLET%
          set OPENSSL_MODULES=%GITHUB_WORKSPACE%\%ARCHNAME%\vcpkg_installed\%VCPKG_DEFAULT_TRIPLET%\bin
          set > new.env

      - name: update env
        shell: pwsh
        run: |
          $old = (Get-Content old.env); $new = (Get-Content new.env)
          del *.env
          Compare-Object $old $new |
            Where-Object { $_.SideIndicator -eq '=>' } |
            Select-Object -ExpandProperty InputObject |
            Add-Content -Path $env:GITHUB_ENV
      - name: Configure
        env:
          ARCHNAME: ${{ inputs.archname }}
        run: >-
          ../%ARCHNAME%/win32/configure.bat --disable-install-doc
          --with-opt-dir=%RUBY_OPT_DIR%
      - run: nmake prepare-vcpkg
      - run: nmake incs
      - run: nmake extract-extlibs
      - run: nmake
        env:
          YACC: win_bison

      - name: ruby -v
        run: .\ruby -v

      - run: nmake test
        timeout-minutes: 5

      - run: nmake ${{ matrix.test_task }}
        env:
          RUBY_TESTOPTS: -j${{env.TEST_JOBS}}
        timeout-minutes: 70
        continue-on-error: ${{ matrix.continue-on-error || false }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: .github/actions/slack
          sparse-checkout-cone-mode: false
          persist-credentials: false
        if: ${{ failure() }}
      - uses: ./.github/actions/slack
        with:
          label: "${{ env.OS_VER }} / ${{ matrix.test_task }}"
          SLACK_WEBHOOK_URL: ${{ secrets.SIMPLER_ALERTS_URL }} # ruby-lang slack: ruby/simpler-alerts-bot
        if: ${{ failure() }}
      - uses: ruby/action-slack@54175162371f1f7c8eb94d7c8644ee2479fcd375 # v3.2.2
        with:
          payload: |
            {
              "attachments": [{
                "text": "${{ job.status }}: ${{ env.OS_VER }} / ${{ matrix.test_task }} <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|${{ inputs.archname }}>",
                "color": "danger"
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SNAPSHOT_SLACK_WEBHOOK_URL }}
        if: failure() && inputs.notify-release-channel
